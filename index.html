<!DOCTYPE html>
<html lang="en">
  <head>
    <title>VMINawebsite - Unblocked Games</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8" />

    <style>
      /* Base Reset */
      html { line-height: 1.15; scroll-behavior: smooth; }
      body { margin: 0; font-family: 'Inter', sans-serif; font-weight: 400; color: #333; background: #fff; }
      * { box-sizing: border-box; border-width: 0; border-style: solid; -webkit-font-smoothing: antialiased; }
      p, li, ul, pre, div, h1, h2, h3, h4, h5, h6 { margin: 0; padding: 0; }
      a { color: inherit; text-decoration: inherit; }
      img { display: block; }

      /* Animation Definitions */
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-30px); }
      }

      /* Layout Styles */
      .home-container1 {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }
      .home-thq-hero-section-elm {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        max-width: 800px;
      }
      .home-thq-hero-title-elm {
        font-size: 3rem;
        margin-bottom: 20px;
      }
      .home-thq-hero-description-elm {
        font-size: 1.25rem;
        line-height: 1.5;
        margin-bottom: 30px;
      }
      .home-thq-hero-buttons-elm {
        display: flex;
        gap: 20px;
      }
      .hero-btn {
        padding: 12px 24px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }
      .hero-btn-primary {
        background-color: #000;
        color: #fff;
      }
      .hero-btn-secondary {
        background-color: #eee;
        color: #000;
      }
      .hero-btn:hover {
        opacity: 0.8;
      }
    </style>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" />
  </head>
  <body>
    <div class="home-container1">
      <section class="home-thq-hero-section-elm">
        <div class="home-thq-hero-content-elm">
          <h1 class="home-thq-hero-title-elm">VMINawebsite</h1>
          <p class="home-thq-hero-description-elm">
            VMINawebsite is one of the best Unblocked games website, and it
            has 100+ fun games to play at school or at home.
          </p>
          <div class="home-thq-hero-buttons-elm">
            <a href="https://vminawebsite.github.io/docs/">
              <div class="hero-btn hero-btn-primary"><span>Docs</span></div>
            </a>
            <a href="https://vminawebsite.github.io/games/">
              <div class="hero-btn hero-btn-secondary">
                <span>Games</span>
              </div>
            </a>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
