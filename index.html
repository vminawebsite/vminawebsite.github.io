<!DOCTYPE html>
<html>
<head>
    <title>VMINawebsite.github.io</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .btn { padding: 15px 40px; background: #fff; color: #000; text-decoration: none; border-radius: 50px; font-weight: bold; cursor: pointer; border: none; font-size: 18px; }
        .btn:hover { background: #ddd; }
        p { color: #666; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <button class="btn" onclick="openSite()">Launch Website</button>
    <p>Click to open</p>

    <script>
        function openSite() {
            // This opens the blank page
            var win = window.open('about:blank', '_blank');
            
            // This fills the blank page with your Google Site
            win.document.write(`
                <html>
                <head>
                    <title>VM IN a website</title>
                    <style>
                        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
                        iframe { width: 100%; height: 100%; border: none; }
                    </style>
                </head>
                <body>
                    <iframe src="https://sites.google.com/view/vminawebsite"></iframe>
                </body>
                </html>
            `);
        }
    </script>
</body>
</html>
